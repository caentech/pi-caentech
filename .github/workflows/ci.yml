name: CI & Preview web

# - build : vérifie que le backend Kotlin/Ktor compile et s'assemble.
# - preview : construit la preview web de l'app LÖVE (make web) et la publie sur
#   GitHub Pages, pour la partager sans rien installer. Ne tourne que sur main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build backend (vérification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Compilation + assemblage
        run: ./gradlew build --no-daemon

  preview:
    name: Preview web → GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # make web a besoin de : love (prefetch headless du cache), les outils de
      # conversion d'images (logos sponsors SVG/webp → PNG), node/npx (love.js),
      # et xvfb pour exécuter love sans écran sur le runner.
      - name: Installer LÖVE + outils image
        run: |
          sudo apt-get update
          sudo apt-get install -y love librsvg2-bin webp imagemagick xvfb

      - name: Node.js (pour love.js)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Construire la preview (make web)
        run: xvfb-run -a make web

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Téléverser l'artefact (pi-app/web/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: pi-app/web/dist

      - name: Déployer sur GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
